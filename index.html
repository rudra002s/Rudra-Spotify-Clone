<!doctype html>
<html lang="en">

<head>
  <link rel="icon" href="https://open.spotifycdn.com/cdn/images/favicon32.b64ecc03.png" />

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Clone</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="utility.css" />
</head>

<body>
  <div class="container flex bg-black">
    <div class="left">
      <div class="cross">
        <img widht="30" src="cross.svg" alt="">
      </div>
      <div class="home bg-grey rounded m-1 p-1">
        <div class="logo">
          <img class="invert" src="logo.svg" alt="logo" />
        </div>
        <ul>
          <li><img class="invert" src="home.svg" alt="home" />HOME</li>
          <li><img class="invert" src="search.svg" alt="search" />SEARCH</li>
        </ul>
      </div>

      <div class="library bg-grey rounded m-1 p-1">
        <div class="heading">
          <img src="playlist.svg" alt="playlist" />
          <h2>Your Library</h2>
        </div>
        <div class="songList">

          <ul>

          </ul>
        </div>

        <div class="footer">
          <div>
            <a href="https://www.spotify.com/in-en/legal/">Legal</a>
          </div>

          <div>
            <a href="https://www.spotify.com/in-en/safetyandprivacy/">
              Safety & Privacy Center
            </a>
          </div>

          <div>
            <a href="https://www.spotify.com/in-en/legal/privacy-policy/">
              Privacy Policy
            </a>
          </div>

          <div>
            <a href="https://www.spotify.com/in-en/legal/cookies-policy/">
              Cookies
            </a>
          </div>

          <div>
            <a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">
              About Ads
            </a>
          </div>

          <div>
            <a href="https://www.spotify.com/in-en/accessibility/">
              Accessibility
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="right bg-grey rounded">
      <div class="header">
        <div class="nav">
          <div class="hamburgericon">
            <img class="hamburger" width="30" src="hamburger.svg" alt="">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
              fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18" />
            </svg>

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
              fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" />
            </svg>
          </div>
        </div>

        <div class="buttons">
          <button class="signupbtn">Sign up</button>
          <button class="loginbtn">Log in</button>
        </div>
      </div>

      <div class="TrendingSongs">
        <h1>Trending Songs</h1>
        <div style="margin-bottom:10px">


          <div class="scrollBtns">
            <button onclick="scrollCardsLeft()">‹</button>
            <button onclick="scrollCardsRight()">›</button>
          </div>

          <div class="cardContainer">

             <!-- CARD 1  -->
            <div data-folder="LoveHits" class="card">

              <div class="play">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="30" height="30" fill="black">
                  <path
                    d="M18.8906 12.846C18.5371 14.189 16.8667 15.138 13.5257 17.0361C10.296 18.8709 8.6812 19.7884 7.37983 19.4196C6.8418 19.2671 6.35159 18.9776 5.95624 18.5787C5 17.6139 5 15.7426 5 12C5 8.2574 5 6.3861 5.95624 5.42132C6.35159 5.02245 6.8418 4.73288 7.37983 4.58042C8.6812 4.21165 10.296 5.12907 13.5257 6.96393C16.8667 8.86197 18.5371 9.811 18.8906 11.154C19.0365 11.7084 19.0365 12.2916 18.8906 12.846Z" />
                </svg>
              </div>

              <img src="img/love.jpeg" alt="Love Hits">
              <h2>Love Hits</h2>
              <p>Love super hits for you</p>

            </div>

            <!-- CARD 2  -->
            <div data-folder="BollywoodHits" class="card">

              <div class="play">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="30" height="30" fill="black">
                  <path
                    d="M18.8906 12.846C18.5371 14.189 16.8667 15.138 13.5257 17.0361C10.296 18.8709 8.6812 19.7884 7.37983 19.4196C6.8418 19.2671 6.35159 18.9776 5.95624 18.5787C5 17.6139 5 15.7426 5 12C5 8.2574 5 6.3861 5.95624 5.42132C6.35159 5.02245 6.8418 4.73288 7.37983 4.58042C8.6812 4.21165 10.296 5.12907 13.5257 6.96393C16.8667 8.86197 18.5371 9.811 18.8906 11.154C19.0365 11.7084 19.0365 12.2916 18.8906 12.846Z" />
                </svg>
              </div>

              <img src="img/bollywood.png" alt="Bollywood Hits">
              <h2>Bollywood Hits</h2>
              <p>Bollywood super hits for you</p>

            </div> 

            <!-- CARD 3  -->
            <div class="card" data-folder="HaryanviHits">
              <img src="img/haryana.png" alt="Haryanvi Hits">

              <div class="play">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#000000"
                  fill="none">
                  <path
                    d="M18.8906 12.846C18.5371 14.189 16.8667 15.138 13.5257 17.0361C10.296 18.8709 8.6812 19.7884 7.37983 19.4196C6.8418 19.2671 6.35159 18.9776 5.95624 18.5787C5 17.6139 5 15.7426 5 12C5 8.2574 5 6.3861 5.95624 5.42129C6.35159 5.02235 6.8418 4.73285 7.37983 4.58042C8.6812 4.21165 10.296 5.12907 13.5257 6.96393C16.8667 8.86197 18.5371 9.81099 18.8906 11.154C19.0365 11.7084 19.0365 12.2916 18.8906 12.846Z"
                    stroke="currentColor" fill="#000" stroke-width="1.5" stroke-linejoin="round" />
                </svg>
              </div>

              <h2>Haryanvi Hits</h2>
              <p>Haryanvi super hits for you</p>
            </div>

            <!-- CARD 4  -->
            <div class="card" data-folder="DriveThrough">
              <img src="img/drive.png" alt="Drive Through">

              <div class="play">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#000000"
                  fill="none">
                  <path
                    d="M18.8906 12.846C18.5371 14.189 16.8667 15.138 13.5257 17.0361C10.296 18.8709 8.6812 19.7884 7.37983 19.4196C6.8418 19.2671 6.35159 18.9776 5.95624 18.5787C5 17.6139 5 15.7426 5 12C5 8.2574 5 6.3861 5.95624 5.42129C6.35159 5.02235 6.8418 4.73285 7.37983 4.58042C8.6812 4.21165 10.296 5.12907 13.5257 6.96393C16.8667 8.86197 18.5371 9.81099 18.8906 11.154C19.0365 11.7084 19.0365 12.2916 18.8906 12.846Z"
                    stroke="currentColor" fill="#000" stroke-width="1.5" stroke-linejoin="round" />
                </svg>
              </div>

              <h2>Drive Through🕊️ 🪽</h2>
              <p>Drive hits for you</p>
            </div>

            <div class="playbar">

              <div class="abovebar">
                <div class="songinfo"></div>

                <div class="songbtn">
                  <img width="40" id="previous" src="previous.svg">
                  <img width="40" id="play" src="pause.svg">
                  <img width="40" id="forward" src="forward.svg">
                </div>

                <div class="timevol">

                  <div class="songtime"></div>

                  <div class="volume">
                    <img width="25" src="volume.svg" alt="">
                    <div class="range">
                      <input type="range" name="volume" id="">
                    </div>
                  </div>
                </div>

              </div>

              <div class="seekbar">
                <div class="circle"></div>
              </div>

            </div>

          </div>
        </div>
      </div>
      <script src="arrows.js"></script>
      <script src="script.js"></script>
</body>

</html>
